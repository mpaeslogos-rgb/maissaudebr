services:
  postgres:
    image: postgres:16-alpine
    container_name: maissaudebr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: maissaudebr
      POSTGRES_PASSWORD: maissaudebr_dev_password
      POSTGRES_DB: maissaudebr
    ports:
      - "5432:5432"
    volumes:
      - maissaudebr_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maissaudebr -d maissaudebr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  maissaudebr_data: